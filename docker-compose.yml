version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: javadev-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: javadev_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: javadev-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/javadev_db?schema=public"
      JWT_SECRET: "super-secret-jwt-key"
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - .:/data/roadmap:ro
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: javadev-frontend
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: "http://backend:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev

volumes:
  pgdata:
